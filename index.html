<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hotdeal Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-color);
            background-image: radial-gradient(circle at top right, #1e1b4b, transparent 40%),
                              radial-gradient(circle at bottom left, #0f172a, transparent 40%);
            color: var(--text-main);
            min-height: 100vh;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            text-align: center;
            margin-bottom: 3rem;
            animation: fadeInDown 0.8s ease-out;
        }

        h1 {
            font-size: 3rem;
            font-weight: 800;
            background: linear-gradient(135deg, #60a5fa, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }

        .stats-container {
            display: flex;
            gap: 1.5rem;
            justify-content: center;
            margin-bottom: 2rem;
            animation: fadeIn 1s ease-out;
        }

        .stat-box {
            background: var(--card-bg);
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(10px);
            padding: 1.5rem 2.5rem;
            border-radius: 1rem;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            transition: transform 0.3s ease;
        }

        .stat-box:hover {
            transform: translateY(-5px);
        }

        .stat-value {
            font-size: 2.5rem;
            font-weight: 800;
            color: var(--accent);
        }

        .stat-label {
            font-size: 0.9rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 0.5rem;
        }

        .controls {
            margin-bottom: 3rem;
            animation: fadeIn 1.2s ease-out;
        }

        .btn {
            background: linear-gradient(135deg, #3b82f6, #4f46e5);
            color: white;
            border: none;
            padding: 1rem 2rem;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 0.75rem;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.4);
        }

        .btn:hover {
            box-shadow: 0 6px 20px rgba(59, 130, 246, 0.6);
            transform: translateY(-2px);
        }

        .deals-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 2rem;
            width: 100%;
            max-width: 1200px;
        }

        .deal-card {
            background: var(--card-bg);
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(10px);
            border-radius: 1rem;
            overflow: hidden;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            animation: fadeInUp 0.6s ease-out backwards;
        }

        .deal-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3);
            border-color: rgba(255, 255, 255, 0.2);
        }

        .deal-image {
            width: 100%;
            height: 200px;
            object-fit: cover;
            background: #1e293b;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-muted);
            font-size: 0.8rem;
        }

        .deal-content {
            padding: 1.5rem;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
        }

        .deal-id {
            font-size: 0.8rem;
            color: var(--accent);
            margin-bottom: 0.5rem;
            font-weight: 600;
        }

        .deal-links {
            margin-top: auto;
            padding-top: 1rem;
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
        }

        .deal-link {
            font-size: 0.8rem;
            color: #93c5fd;
            text-decoration: none;
            background: rgba(59, 130, 246, 0.1);
            padding: 0.3rem 0.8rem;
            border-radius: 1rem;
            transition: background 0.2s;
        }

        .deal-link:hover {
            background: rgba(59, 130, 246, 0.2);
        }

        .link-main {
            display: inline-block;
            margin-top: 1rem;
            color: white;
            background: rgba(255, 255, 255, 0.1);
            padding: 0.5rem 1rem;
            border-radius: 0.5rem;
            text-decoration: none;
            text-align: center;
            transition: background 0.3s;
        }

        .link-main:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        /* Animations */
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

    </style>
</head>
<body>

    <header>
        <h1>Hotdeal Dashboard</h1>
        <p style="color: var(--text-muted);">FMKorea 자동 수집 데이터베이스 현황</p>
    </header>

    <div class="stats-container">
        <div class="stat-box">
            <div class="stat-value" id="total-deals">0</div>
            <div class="stat-label">Total Deals Collected</div>
        </div>
        <div class="stat-box">
            <div class="stat-value" id="last-updated">-</div>
            <div class="stat-label">Last Updated</div>
        </div>
    </div>

    <div class="controls">
        <a href="https://github.com" id="manual-trigger-btn" target="_blank" class="btn">
            수동 수집 명령 (Github Actions)
        </a>
    </div>

    <div class="deals-grid" id="deals-grid">
        <!-- Cards will be injected here -->
    </div>

    <script>
        // 현재 레포지토리의 Github Actions 탭으로 이동하기 위한 링크 설정
        const repoPath = window.location.pathname.split('/')[1] || 'gitDB';
        const actionsUrl = `https://github.com/${window.location.hostname.split('.')[0]}/${repoPath}/actions`;
        document.getElementById('manual-trigger-btn').href = actionsUrl;

        async function loadData() {
            try {
                // Fetch the JSON API generated by the crawler
                const response = await fetch('api/data.json');
                if (!response.ok) throw new Error('Data not found');
                
                const data = await response.json();
                const deals = Object.entries(data);
                
                // Update stats
                document.getElementById('total-deals').innerText = deals.length;
                document.getElementById('last-updated').innerText = new Date().toLocaleTimeString();

                const grid = document.getElementById('deals-grid');
                grid.innerHTML = '';

                // Render deals
                deals.forEach(([id, deal], index) => {
                    const card = document.createElement('div');
                    card.className = 'deal-card';
                    card.style.animationDelay = `${index * 0.05}s`;

                    // Default image fallback
                    let mainImage = deal.images && deal.images.length > 0 
                        ? deal.images[0] 
                        : '';
                    
                    let imageHtml = mainImage 
                        ? `<img src="${mainImage}" alt="Deal Image" class="deal-image" onerror="this.style.display='none'">` 
                        : `<div class="deal-image">No Image Available</div>`;

                    let linksHtml = '';
                    if (deal.links && deal.links.length > 0) {
                        linksHtml = `<div class="deal-links">` + 
                            deal.links.slice(0, 3).map(link => 
                                `<a href="${link}" target="_blank" class="deal-link">🔗 관련 링크</a>`
                            ).join('') + 
                            `</div>`;
                    }

                    card.innerHTML = `
                        ${imageHtml}
                        <div class="deal-content">
                            <div class="deal-id">Post ID: #${id}</div>
                            <a href="${deal.url}" target="_blank" class="link-main">게시글 바로가기</a>
                            ${linksHtml}
                        </div>
                    `;
                    grid.appendChild(card);
                });

            } catch (error) {
                console.error('Error loading data:', error);
                document.getElementById('deals-grid').innerHTML = `
                    <div style="grid-column: 1/-1; text-align: center; padding: 3rem; color: #ef4444; background: rgba(239, 68, 68, 0.1); border-radius: 1rem; border: 1px solid rgba(239, 68, 68, 0.2);">
                        데이터를 불러올 수 없습니다. 크롤러가 아직 실행되지 않았거나 Github Pages에 데이터가 배포되지 않았을 수 있습니다.
                    </div>
                `;
            }
        }

        // Initialize
        loadData();
    </script>
</body>
</html>
